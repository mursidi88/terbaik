<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register Interaktif (Gaya Kaligrafi Klasik)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Mengimpor font standar dan font kaligrafi bergaya klasik/script */
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* REVISI: MENGGUNAKAN SOURCE SRC IMAGE DARI URL INTERNET */
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('123.png');
            background-size: 100% auto;
            background-position: center;
            background-repeat: no-repeat;
            
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* NAVIGASI TOMBOL DI POJOK KANAN ATAS */
        .top-nav {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 20;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .nav-btn.accent {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }

        .nav-btn.accent:hover {
            background-color: #4338ca;
            border-color: #4338ca;
        }

        /* REVISI: TEKS DIUBAH KE POJOK KIRI ATAS DENGAN GAYA FONT KALIGRAFI */
        .welcome-left {
            position: absolute;
            top: 40px;
            left: 50px;
            text-align: left;
            color: #ffffff;
            max-width: 500px;
            transition: all 0.5s ease;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        .welcome-left h1 {
            font-family: 'Ariel', cursive; /* Menggunakan font kaligrafi berlekuk */
            font-size: 4.5rem; /* Ukuran diperbesar khas tulisan dekoratif */
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 5px;
            color: rgb(255, 252, 252);
        }

        .welcome-left p {
            font-family: 'Times Now Romans', cursive; /* Diubah ke Alex Brush agar senada dengan lekukan tulisan gambar */
            font-size: 2rem;
            font-weight: 400;
            opacity: 0.95;
            letter-spacing: 1px;
            color:rgb(250, 247, 247);
        }

        /* BLUR OVERLAY UNTUK METODE MODAL POPUP */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            
            /* Kondisi Awal: Disembunyikan & Transparan */
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease-in-out;
        }

        /* Memicu Modal Aktif (Dipanggil via JS) */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* CONTAINER UTAMA LOGIN */
        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.3), 0 10px 10px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            width: 750px;
            max-width: 95%;
            min-height: 480px;
            
            /* Efek animasi muncul meluncur dari atas */
            transform: translateY(-50px);
            transition: transform 0.5s ease-in-out;
        }

        .modal-overlay.active .container {
            transform: translateY(0);
        }

        /* TOMBOL CLOSE KOTAK FORM */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            color: #333;
            cursor: pointer;
            z-index: 150;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        /* STRUKTUR FORM UTAMA */
        h2 { font-weight: 700; margin-bottom: 10px; color: #333; }
        h3 { font-weight: 600; color: #fff; }
        p.form-text { font-size: 13px; font-weight: 300; line-height: 18px; margin: 15px 0 25px; color: #fff; }
        span { font-size: 11px; color: #666; margin-bottom: 10px; }
        a.forgot-pwd { color: #333; font-size: 13px; text-decoration: none; margin: 12px 0; }
        a.forgot-pwd:hover { text-decoration: underline; }

        .form-container { position: absolute; top: 0; height: 100%; transition: all 0.6s ease-in-out; }
        .sign-in-container { left: 0; width: 50%; z-index: 2; }
        .sign-up-container { left: 0; width: 50%; opacity: 0; z-index: 1; }

        form { background-color: #fff; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0 40px; height: 100%; text-align: center; }

        .input-group { background-color: #f0f0f0; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; margin: 6px 0; width: 100%; }
        .input-group i { color: #888; margin-right: 8px; font-size: 14px; }
        .input-group input { background: none; border: none; outline: none; padding: 10px 5px; width: 100%; font-family: 'Poppins', sans-serif; font-size: 13px; }

        .btn { border-radius: 25px; border: 1px solid #4f46e5; background-color: #4f46e5; color: #ffffff; font-size: 13px; font-weight: bold; padding: 10px 40px; letter-spacing: 1px; text-transform: uppercase; transition: transform 80ms ease-in; cursor: pointer; margin-top: 10px; }
        .btn:active { transform: scale(0.95); }
        .btn:hover { background-color: #4338ca; }
        .btn.transparent { background-color: transparent; border-color: #ffffff; }
        .btn.transparent:hover { background-color: rgba(255, 255, 255, 0.15); }

        .social-container { margin: 15px 0; }
        .social-container a { border: 1px solid #ddd; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 0 5px; height: 36px; width: 36px; transition: 0.3s; color: #333; }
        .social-container a:hover { background-color: #eee; }

        .overlay-container { position: absolute; top: 0; left: 50%; width: 50%; height: 100%; overflow: hidden; transition: transform 0.6s ease-in-out; z-index: 100; }
        .overlay { background: linear-gradient(to right, #6366f1, #4f46e5); color: #ffffff; position: relative; left: -100%; height: 100%; width: 200%; transform: translateX(0); transition: transform 0.6s ease-in-out; }
        .overlay-panel { position: absolute; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 0 30px; text-align: center; top: 0; height: 100%; width: 50%; transform: translateX(0); transition: transform 0.6s ease-in-out; }
        .overlay-left { transform: translateX(-20%); }
        .overlay-right { right: 0; transform: translateX(0); }

        /* LOGIKA ANIMASI SLIDE INTERNAL FORM */
        .container.right-panel-active .sign-in-container { transform: translateX(100%); }
        .container.right-panel-active .sign-up-container { transform: translateX(100%); opacity: 1; z-index: 5; animation: show 0.6s; }
        .container.right-panel-active .overlay-container { transform: translateX(-100%); }
        .container.right-panel-active .overlay { transform: translateX(50%); }
        .container.right-panel-active .overlay-left { transform: translateX(0); }
        .container.right-panel-active .overlay-right { transform: translateX(20%); }

        @keyframes show { 0%, 49.99% { opacity: 0; z-index: 1; } 50%, 100% { opacity: 1; z-index: 5; } }

        /* RESPONSIVE UNTUK LAYAR SMARTPHONE */
        @media (max-width: 768px) {
            .welcome-left { position: relative; top: 20px; left: 0; text-align: center; padding: 0 20px; }
            .welcome-left h1 { font-size: 3rem; }
            .welcome-left p { font-size: 1.5rem; }
            .top-nav { top: auto; bottom: 20px; right: 50%; transform: translateX(50%); }
            body { flex-direction: column; justify-content: flex-start; padding-top: 40px; }
            .container { width: 100%; min-height: 480px; }
            .overlay-container { display: none; }
            .sign-in-container, .sign-up-container { width: 100%; }
            .container.right-panel-active .sign-in-container { transform: translateX(-100%); opacity: 0; }
            .container.right-panel-active .sign-up-container { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" id="showLoginBtn">Masuk</button>
        <button class="nav-btn accent" id="showRegisterBtn">Daftar</button>
    </div>

    <div class="welcome-left" id="welcomeText">
        <h1>MURSIDI88</h1>
        <p>SLOT GACOR ANTI GELENG</p>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="container" id="container">
            
            <button class="close-btn" id="closeBtn">&times;</button>

            <div class="form-container sign-up-container">
                <form action="#">
                    <h2>Buat Akun</h2>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social"><i class="fab fa-google"></i></a>
                    </div>
                    <span>atau gunakan email untuk registrasi</span>
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Nama Lengkap" required />
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email" required />
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password" required />
                    </div>
                    <button type="submit" class="btn">Daftar</button>
                </form>
            </div>

            <div class="form-container sign-in-container">
                <form action="#">
                    <h2>Masuk</h2>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social"><i class="fab fa-google"></i></a>
                    </div>
                    <span>atau gunakan akun yang sudah ada</span>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email" required />
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Password" required />
                    </div>
                    <a href="#" class="forgot-pwd">Lupa password?</a>
                    <button type="submit" class="btn">Masuk</button>
                </form>
            </div>

            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h3>Sudah Punya Akun?</h3>
                        <p class="form-text">Silakan masuk untuk melanjutkan aktivitas Anda</p>
                        <button class="btn transparent" id="signIn">Masuk</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h3>Belum Punya Akun?</h3>
                        <p class="form-text">Daftar sekarang dan nikmati semua fitur kami</p>
                        <button class="btn transparent" id="signUp">Daftar</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Inisialisasi Elemen DOM
        const showLoginBtn = document.getElementById('showLoginBtn');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const welcomeText = document.getElementById('welcomeText');

        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        // Buka Form Modal (Mode Login)
        showLoginBtn.addEventListener('click', () => {
            container.classList.remove("right-panel-active"); 
            modalOverlay.classList.add('active'); 
            welcomeText.style.opacity = "0"; 
            welcomeText.style.transform = "scale(0.95)";
        });

        // Buka Form Modal (Mode Register)
        showRegisterBtn.addEventListener('click', () => {
            container.classList.add("right-panel-active"); 
            modalOverlay.classList.add('active'); 
            welcomeText.style.opacity = "0"; 
            welcomeText.style.transform = "scale(0.95)";
        });

        // Tutup Form Modal (Kembali ke halaman utama bersih)
        closeBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            welcomeText.style.opacity = "1"; 
            welcomeText.style.transform = "scale(1)";
        });

        // Navigasi Slider Internal di dalam kotak Tengah
        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });
        
        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</body>
</html>
